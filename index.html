<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Recruitment Portal</title>
<link rel="stylesheet" href="apiproject.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">SASI JobPortal</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Jobs</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Companies</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
      </ul>

      <a href="#" class="btn btn-light ms-lg-3">Post a Job</a>
    </div>
  </div>
</nav>

<section class="bg-light py-5">
  <div class="container">
    <div class="row align-items-center">
      
      <div class="col-lg-6 text-center text-lg-start">
        <h1 class="display">Find Your Dream Job Today</h1>
        <p class="lead">Browse thousands of job listings from top companies and apply instantly.</p>

     
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Search jobs..." id="searchInput">
          <button class="btn btn-primary" onclick="searchJobs()">Search</button>
        </div>
      </div>

   
      <div class="col-lg-6 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" 
             alt="Jobs" 
             class="img-fluid" 
             style="max-height: 300px;">
      </div>

    </div>
  </div>
</section>


</header>

<main>
<div id="job-container" class="job-container"></div>
</main>

<div id="loader" class="loader">Loading jobs...</div>

<script src="apiproject.js"></script>

</body>
</html>
